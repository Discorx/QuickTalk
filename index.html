<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMORPG Dev Dashboard</title>
<style>
:root{
  --bg:#0b1020;
  --panel:#121936;
  --accent:#6366f1;
  --accent2:#22c55e;
  --text:#e5e7eb;
  --muted:#9ca3af;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui,Arial;
  background:radial-gradient(circle at top,#1e293b,var(--bg));
  color:var(--text);
}
h1{
  text-align:center;
  padding:20px;
  letter-spacing:1px;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.toolbar{
  display:flex;
  gap:10px;
  justify-content:space-between;
  flex-wrap:wrap;
  margin-bottom:15px;
}
input[type=text]{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#0f172a;
  color:white;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}
.progress{
  height:18px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:20px;
}
.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:.3s;
}
.category{
  margin-bottom:18px;
  background:var(--panel);
  border-radius:14px;
  padding:15px;
  box-shadow:0 0 20px rgba(0,0,0,.4);
}
.category h2{
  margin:0 0 10px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}
.item{
  display:flex;
  align-items:center;
  padding:6px 0;
}
.item label{
  flex:1;
}
.item.done label{
  text-decoration:line-through;
  color:var(--muted);
}
.badge{
  font-size:11px;
  padding:3px 6px;
  border-radius:6px;
  background:#1f2937;
  margin-left:6px;
}
</style>
</head>
<body>

<h1>MMORPG Dev Dashboard</h1>
<div class="container">

<div class="toolbar">
  <input id="search" placeholder="Buscar tarea...">
  <button onclick="exportData()">Exportar</button>
  <button onclick="importData()">Importar</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div class="progress"><div id="progressBar" class="progress-bar"></div></div>

<div id="checklist"></div>
</div>

<script>
const data={
"Diseño":[
"Core loop","Balance","Economía","PvE","PvP","Endgame","Monetización","Retención","Eventos","Clanes"
],
"Cliente":[
"Movimiento","Cámara","Animaciones","UI","Inventario","Mapa","Chat","Optimización","Controles mobile"
],
"Servidor":[
"Servidor autoritativo","Sincronización","Instancias","Escalado","Validación","Gestión sesiones"
],
"Networking":[
"Protocolos","Compresión","Predicción","Reconciliación","Lag compensation","Reconexión"
],
"Base de Datos":[
"Persistencia","Inventarios","Progreso","Backups","Cache","Escalabilidad"
],
"Gameplay":[
"Combate","IA","Loot","Crafting","Trading","Quests","NPCs","Skills"
],
"Contenido":[
"Modelos","Animaciones","VFX","Audio","Lore","Misiones","Enemigos"
],
"Infraestructura":[
"Hosting","Docker","Kubernetes","Logs","Monitoreo","Autoescalado"
],
"Seguridad":[
"Anti-cheat","Cifrado","Auth segura","Prevención exploits"
]
};

const checklist=document.getElementById("checklist");
const search=document.getElementById("search");

function save(){
  const s={};
  document.querySelectorAll("input").forEach(cb=>s[cb.id]=cb.checked);
  localStorage.setItem("mmocheck",JSON.stringify(s));
  update();
}
function load(){return JSON.parse(localStorage.getItem("mmocheck")||"{}");}

function update(){
  const all=document.querySelectorAll("input");
  const done=document.querySelectorAll("input:checked");
  document.getElementById("progressBar").style.width=(done.length/all.length*100)+"%";
}

function render(){
  checklist.innerHTML="";
  const saved=load();

  Object.entries(data).forEach(([cat,items])=>{
    const div=document.createElement("div");
    div.className="category";

    const title=document.createElement("h2");
    title.textContent=cat;
    div.appendChild(title);

    items.forEach((it,i)=>{
      if(search.value && !it.toLowerCase().includes(search.value.toLowerCase())) return;

      const id=cat+i;
      const row=document.createElement("div");
      row.className="item";

      const cb=document.createElement("input");
      cb.type="checkbox";
      cb.id=id;
      cb.checked=saved[id]||false;
      if(cb.checked) row.classList.add("done");
      cb.onchange=()=>{row.classList.toggle("done");save();};

      const label=document.createElement("label");
      label.textContent=it;

      const badge=document.createElement("span");
      badge.className="badge";
      badge.textContent="task";

      row.appendChild(cb);
      row.appendChild(label);
      row.appendChild(badge);
      div.appendChild(row);
    });

    checklist.appendChild(div);
  });

  update();
}

search.oninput=render;

function exportData(){
  const data=localStorage.getItem("mmocheck");
  prompt("Copia tu progreso:",data);
}
function importData(){
  const d=prompt("Pega tu progreso:");
  if(d) localStorage.setItem("mmocheck",d),render();
}
function resetAll(){
  if(confirm("Borrar progreso?")) localStorage.removeItem("mmocheck"),render();
}

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMORPG Checklist</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #e2e8f0;
    }
    h1 {
        text-align: center;
        padding: 20px;
    }
    .container {
        max-width: 1000px;
        margin: auto;
        padding: 20px;
    }
    .category {
        margin-bottom: 20px;
        background: rgba(255,255,255,0.05);
        border-radius: 12px;
        padding: 15px;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    .category h2 {
        margin-top: 0;
    }
    .item {
        display: flex;
        align-items: center;
        padding: 5px 0;
    }
    input[type="checkbox"] {
        margin-right: 10px;
        transform: scale(1.2);
    }
    .progress {
        height: 20px;
        background: #334155;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 20px;
    }
    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #22c55e, #4ade80);
        transition: width 0.3s;
    }
</style>
</head>
<body>

<h1>MMORPG Checklist</h1>
<div class="container">
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    <div id="checklist"></div>
</div>

<script>
const data = {
    "Diseño": [
        "Core loop definido",
        "Progresión",
        "Sistema de combate",
        "Economía",
        "PvE",
        "PvP"
    ],
    "Cliente": [
        "Movimiento",
        "Cámara",
        "UI",
        "Inventario",
        "Chat"
    ],
    "Servidor": [
        "Servidor autoritativo",
        "Conexión estable",
        "Sincronización",
        "Instancias"
    ],
    "Networking": [
        "Protocolos",
        "Predicción",
        "Reconciliación",
        "Lag compensation"
    ],
    "Base de Datos": [
        "Guardado de personajes",
        "Inventario",
        "Backups"
    ]
};

const checklist = document.getElementById("checklist");

function saveState() {
    const states = {};
    document.querySelectorAll("input[type=checkbox]").forEach(cb => {
        states[cb.id] = cb.checked;
    });
    localStorage.setItem("mmorpgChecklist", JSON.stringify(states));
    updateProgress();
}

function loadState() {
    return JSON.parse(localStorage.getItem("mmorpgChecklist") || "{}");
}

function updateProgress() {
    const checkboxes = document.querySelectorAll("input[type=checkbox]");
    const checked = document.querySelectorAll("input[type=checkbox]:checked");
    const percent = (checked.length / checkboxes.length) * 100;
    document.getElementById("progressBar").style.width = percent + "%";
}

function render() {
    const saved = loadState();

    Object.keys(data).forEach(category => {
        const div = document.createElement("div");
        div.className = "category";

        const title = document.createElement("h2");
        title.textContent = category;
        div.appendChild(title);

        data[category].forEach((item, i) => {
            const id = category + "-" + i;

            const wrapper = document.createElement("div");
            wrapper.className = "item";

            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.id = id;
            cb.checked = saved[id] || false;
            cb.addEventListener("change", saveState);

            const label = document.createElement("label");
            label.htmlFor = id;
            label.textContent = item;

            wrapper.appendChild(cb);
            wrapper.appendChild(label);
            div.appendChild(wrapper);
        });

        checklist.appendChild(div);
    });

    updateProgress();
}

render();
</script>

</body>
</html>
